<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REVERSED BROS ULTIMATE</title>
    <style>
        :root { --sky: #5c94fa; --brick: #914400; --grass: #48a048; }
        body { 
            margin: 0; background: #000; overflow: hidden; 
            font-family: 'Arial Black', sans-serif;
            /* The Core Rage Mechanic */
            transform: rotate(180deg); 
            touch-action: none;
        }

        #game-container {
            width: 100vw; height: 100vh;
            background: var(--sky);
            background-image: radial-gradient(circle, #ffffff 1px, transparent 1px);
            background-size: 50px 50px;
            position: relative;
            transition: transform 0.1s; /* For Screen Shake */
        }

        #player {
            width: 32px; height: 40px;
            background: #ff4545;
            position: absolute;
            border: 3px solid #000;
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .platform {
            position: absolute;
            background: var(--brick);
            border: 4px solid #4a2200;
            box-sizing: border-box;
            box-shadow: 0 4px 0 #000;
        }

        .platform::after {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 8px; background: var(--grass);
        }

        #ui {
            position: fixed; top: 20px; left: 20px;
            color: white; text-shadow: 3px 3px 0 #000;
            transform: rotate(180deg); z-index: 100;
        }

        .controls {
            position: fixed; bottom: 20px; width: 100%;
            display: flex; justify-content: center; gap: 20px;
            transform: rotate(180deg); z-index: 100;
        }

        .btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.3);
            border: 4px solid #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 12px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="player"></div>
    </div>

<div class="controls">
    <div class="btn" id="btn-left">RIGHT</div>
    <div class="btn" id="btn-jump" style="background: rgba(255,100,100,0.5)">JUMP</div>
    <div class="btn" id="btn-right">LEFT</div>
</div>

<script>
    const container = document.getElementById('game-container');
    const playerEl = document.getElementById('player');
    const scoreEl = document.getElementById('score');

    let player = {
        x: 100, y: 100, w: 32, h: 40,
        vx: 0, vy: 0, 
        isGrounded: false
    };

    const config = {
        gravity: 0.7,
        friction: 0.85,
        speed: 1.2,
        jump: -15
    };

    const platforms = [
        { x: 0, y: 0, w: 2000, h: 40 }, // Floor
        { x: 100, y: 150, w: 150, h: 30 },
        { x: 350, y: 280, w: 200, h: 30 },
        { x: 100, y: 400, w: 180, h: 30 },
        { x: 500, y: 500, w: 200, h: 30 },
        { x: 200, y: 650, w: 300, h: 30 }
    ];

    // Create Platform Elements
    platforms.forEach(p => {
        const div = document.createElement('div');
        div.className = 'platform';
        div.style.left = p.x + 'px';
        div.style.bottom = p.y + 'px';
        div.style.width = p.w + 'px';
        div.style.height = p.h + 'px';
        container.appendChild(div);
    });

    const keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function shake() {
        container.style.transform = `translate(${Math.random()*5}px, ${Math.random()*5}px)`;
        setTimeout(() => container.style.transform = 'translate(0,0)', 50);
    }

    function update() {
        // Reversed Horizontal Input
        if (keys['ArrowRight'] || keys['KeyD'] || keys['leftBtn']) player.vx -= config.speed;
        if (keys['ArrowLeft'] || keys['KeyA'] || keys['rightBtn']) player.vx += config.speed;
        
        // Jump
        if ((keys['Space'] || keys['ArrowUp'] || keys['jumpBtn']) && player.isGrounded) {
            player.vy = config.jump;
            player.isGrounded = false;
        }

        // Apply Physics
        player.vy += config.gravity;
        player.vx *= config.friction;
        
        player.x += player.vx;
        player.y -= player.vy;

        player.isGrounded = false;

        // AABB Collision Detection
        platforms.forEach(p => {
            if (player.x < p.x + p.w &&
                player.x + player.w > p.x &&
                player.y < p.y + p.h &&
                player.y + player.h > p.y) {
                
                // Check if falling onto top of platform
                if (player.vy > 0 && (player.y + player.vy) >= (p.y + p.h - 10)) {
                    player.y = p.y + p.h;
                    player.vy = 0;
                    player.isGrounded = true;
                } 
                // Hit head or side
                else {
                    player.vx *= -1; // Bounce off walls
                    shake();
                }
            }
        });

        // Screen Boundaries
        if (player.x > window.innerWidth) player.x = -player.w;
        if (player.x < -player.w) player.x = window.innerWidth;

        // Visual Updates
        playerEl.style.left = player.x + 'px';
        playerEl.style.bottom = player.y + 'px';
        
        scoreEl.innerText = Math.floor(Date.now() / 1000) % 10000;

        requestAnimationFrame(update);
    }

    // Touch Event Mapping (Reversed labels)
    const setupBtn = (id, key) => {
        const el = document.getElementById(id);
        el.ontouchstart = (e) => { e.preventDefault(); keys[key] = true; };
        el.ontouchend = () => keys[key] = false;
    };

    setupBtn('btn-left', 'leftBtn');
    setupBtn('btn-right', 'rightBtn');
    setupBtn('btn-jump', 'jumpBtn');

    update();
</script>
</body>
</html>
